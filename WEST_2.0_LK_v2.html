<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WEST 2.0 — Личный кабинет (рабочий прототип v2)</title>
<style>
:root{
  --primary:#0A2540; --accent:#1F8FFF; --accent-2:#0066CC; --soft:#EFF6FF;
  --bg:#F8FAFC; --surface:#FFFFFF; --ink:#0F172A; --text:#1E293B; --muted:#64748B;
  --border:#E2E8F0; --border-s:#CBD5E1;
  --good:#047857; --good-bg:#D1FAE5; --warn:#B45309; --warn-bg:#FEF3C7;
  --danger:#B91C1C; --danger-bg:#FEE2E2; --info:#1D4ED8; --info-bg:#DBEAFE;
  --gold:#92400E; --gold-bg:#FEF3C7;
  --shadow-sm:0 1px 2px rgba(15,23,42,.05);
  --shadow:0 8px 24px rgba(15,23,42,.08);
  --shadow-lg:0 20px 50px rgba(15,23,42,.18);
  --r-md:12px; --r-sm:8px; --r-xs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font:14px/1.5 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-feature-settings:'tnum' 1;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit}
img{display:block;max-width:100%}

/* Layout */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:5}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 28px;position:sticky;top:0;z-index:4}
.content{padding:28px;max-width:1320px;width:100%;margin:0 auto}

/* Brand */
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid var(--border);margin-bottom:14px}
.brand-logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#1F8FFF,#0A2540);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.brand-name{font-weight:700;font-size:15px;color:var(--primary)}
.brand-sub{font-size:11px;color:var(--muted)}

/* Nav */
.nav-sec{margin-bottom:14px}
.nav-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:4px 12px;margin-bottom:4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r-sm);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;border-left:3px solid transparent;margin-left:-3px;transition:background 120ms}
.nav-item:hover{background:var(--bg)}
.nav-item.active{background:var(--soft);color:var(--primary);font-weight:600;border-left-color:var(--accent)}
.nav-icon{width:18px;height:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px}
.nav-badge.danger{background:var(--danger)}
.nav-badge.warn{background:var(--warn);color:#fff}

/* Topbar */
.search{flex:1;max-width:480px;position:relative}
.search input{width:100%;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 16px 0 40px;font-size:14px;background:var(--bg);outline:none;transition:border-color 150ms,background 150ms}
.search input:focus{border-color:var(--accent);background:var(--surface)}
.search svg{position:absolute;left:12px;top:11px;width:18px;height:18px;color:var(--muted)}
.top-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text);position:relative;transition:background 120ms}
.icon-btn:hover{background:var(--bg)}
.icon-btn .dot{position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--surface)}
.ai-launch{display:flex;align-items:center;gap:8px;height:40px;padding:0 14px;border-radius:8px;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);color:var(--primary);font-weight:600;font-size:13px;border:1px solid #BFDBFE}
.ai-launch:hover{background:linear-gradient(135deg,#DBEAFE,#BFDBFE)}
.user{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background 120ms}
.user:hover{background:var(--bg)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1F8FFF,#0A2540);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}
.user-info{line-height:1.2}
.user-name{font-size:13px;font-weight:600;color:var(--ink)}
.user-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.seg-a{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:linear-gradient(135deg,#FEF3C7,#FCD34D);color:#92400E;font-size:10px;font-weight:800}

/* Common */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:14px;flex-wrap:wrap}
.page-title{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.5px}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px}
.breadcrumbs{font-size:13px;color:var(--muted);margin-bottom:6px}
.breadcrumbs a{color:var(--muted)}
.breadcrumbs a:hover{color:var(--accent)}

.row{display:grid;gap:20px}
.row.c4{grid-template-columns:repeat(4,1fr)}
.row.c3{grid-template-columns:repeat(3,1fr)}
.row.c2{grid-template-columns:repeat(2,1fr)}
.row.c-5-3{grid-template-columns:5fr 3fr}
.row.c-2-1{grid-template-columns:2fr 1fr}
.mb{margin-bottom:20px}
.mt{margin-top:20px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px}
.card-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-ico{width:38px;height:38px;border-radius:10px;background:var(--soft);color:var(--accent);display:flex;align-items:center;justify-content:center}
.card-ico svg{width:18px;height:18px}
.card-lab{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
.card-val{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.4px;line-height:1.2}
.card-sub{font-size:13px;color:var(--text);margin-top:6px;line-height:1.4}
.card-foot{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.card-click{transition:box-shadow 120ms,border-color 120ms;cursor:pointer}
.card-click:hover{box-shadow:var(--shadow);border-color:var(--border-s)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--r-xs);font-size:12px;font-weight:600;line-height:1.4}
.b-info{background:var(--info-bg);color:var(--info)}
.b-accept{background:#E0E7FF;color:#3730A3}
.b-assemble{background:#DBEAFE;color:var(--info)}
.b-ready{background:var(--warn-bg);color:var(--warn)}
.b-ship{background:#DCFCE7;color:var(--good)}
.b-deliv{background:#BBF7D0;color:var(--good)}
.b-cancel{background:var(--danger-bg);color:var(--danger)}
.b-new{background:var(--soft);color:var(--accent)}
.b-segA{background:linear-gradient(135deg,#FEF3C7,#FCD34D);color:#92400E;font-weight:700}
.b-gold{background:var(--gold-bg);color:var(--gold);font-weight:700}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:40px;padding:0 16px;border-radius:var(--r-sm);font-size:14px;font-weight:600;transition:all 150ms;border:1px solid transparent;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-2)}
.btn-secondary{background:var(--surface);color:var(--ink);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg);border-color:var(--border-s)}
.btn-link{background:transparent;color:var(--accent);padding:0 4px;height:auto}
.btn-link:hover{text-decoration:underline}
.btn-sm{height:32px;font-size:13px;padding:0 12px}
.btn-icon{width:32px;padding:0;height:32px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#991B1B}
.btn-gold{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff}
.btn-gold:hover{filter:brightness(.95)}

/* Alerts */
.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.alert{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r-sm);border:1px solid;background:var(--surface);font-size:14px;cursor:pointer;transition:all 120ms}
.alert:hover{transform:translateX(2px)}
.a-danger{border-color:#FCA5A5;background:#FEF2F2;color:#991B1B}
.a-warn{border-color:#FCD34D;background:#FFFBEB;color:#92400E}
.a-info{border-color:var(--accent);background:var(--soft);color:var(--primary)}
.a-good{border-color:#6EE7B7;background:#ECFDF5;color:#065F46}
.alert-text{flex:1}
.alert strong{font-weight:600}
.alert-ico{flex-shrink:0;width:20px;height:20px}

/* Tables */
.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px}
.tbl th{background:var(--bg);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg)}
.tbl tr.clickable{cursor:pointer}
.num{font-weight:600;color:var(--ink)}
.tbl-card{padding:0;overflow:hidden}

/* Filters */
.filters{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter{height:34px;padding:0 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);font-size:13px;color:var(--text);font-weight:500;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all 120ms}
.filter:hover{border-color:var(--border-s)}
.filter.active{background:var(--soft);border-color:var(--accent);color:var(--primary)}
.filter svg{width:14px;height:14px}
.filter-clear{color:var(--danger);background:#FEF2F2;border-color:#FCA5A5}

/* Tabs */
.tabs{display:flex;flex-wrap:nowrap;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:4px}
.tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tab{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:42px;padding:0 14px;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;transition:all 120ms;background:none;line-height:1;flex-shrink:0}
.tab svg,.tab img{width:14px;height:14px;flex-shrink:0}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Timeline */
.timeline{display:flex;align-items:flex-start;margin:14px 0 18px;overflow-x:auto;padding:0 4px}
.tl-step{flex:1;text-align:center;position:relative;padding:0 8px;min-width:80px}
.tl-step::after{content:'';position:absolute;top:11px;left:50%;right:-50%;height:2px;background:var(--border)}
.tl-step:last-child::after{display:none}
.tl-step.done::after{background:var(--good)}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--surface);border:2px solid var(--border);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);position:relative;z-index:1}
.tl-step.done .tl-dot{background:var(--good);border-color:var(--good);color:#fff}
.tl-step.active .tl-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--soft)}
.tl-step.active .tl-dot::before{content:'';position:absolute;width:32px;height:32px;border-radius:50%;border:2px solid var(--accent);opacity:.4;animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(.8);opacity:.6}100%{transform:scale(1.4);opacity:0}}
.tl-lab{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:2px}
.tl-time{font-size:11px;color:var(--muted)}

/* Mini list */
.mlist{display:flex;flex-direction:column;gap:8px}
.mitem{display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--r-sm);transition:background 120ms;cursor:pointer;border:1px solid transparent}
.mitem:hover{background:var(--bg);border-color:var(--border)}
.mthumb{width:42px;height:42px;border-radius:8px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);border:1px solid var(--border)}
.minfo{flex:1;min-width:0}
.mtitle{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mmeta{font-size:12px;color:var(--muted)}

.sec-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-link{font-size:13px;color:var(--accent);font-weight:500}

/* Manager */
.mgr{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#F8FAFC,#EFF6FF);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 18px}
.mgr-av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1F8FFF,#0A2540);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px}
.mgr-info{flex:1}
.mgr-name{font-size:15px;font-weight:700;color:var(--ink)}
.mgr-role{font-size:12px;color:var(--muted);margin-bottom:2px}
.mgr-meta{font-size:12px;color:var(--text)}
.mgr-actions{display:flex;gap:6px}

/* Recos */
.reco-strip{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.reco{min-width:170px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;flex-shrink:0;cursor:pointer;transition:all 120ms}
.reco:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.reco-thumb{height:78px;background:var(--bg);border-radius:var(--r-xs);margin-bottom:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.reco-name{font-size:12px;font-weight:500;color:var(--ink);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:32px;margin-bottom:4px}
.reco-price{font-size:13px;font-weight:700;color:var(--ink)}
.reco-price s{color:var(--muted);font-weight:400;font-size:11px;margin-left:4px}
.reco-add{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.reco{position:relative}
.reco:hover .reco-add{display:flex}

/* Loyalty hero */
.lhero{background:linear-gradient(135deg,#0A2540 0%,#1F8FFF 100%);color:#fff;border-radius:var(--r-md);padding:24px;position:relative;overflow:hidden}
.lhero::before{content:'';position:absolute;right:-50px;bottom:-50px;width:240px;height:240px;border:2px solid rgba(255,255,255,.08);border-radius:50%}
.lhero::after{content:'';position:absolute;right:20px;bottom:20px;width:140px;height:140px;border:1px solid rgba(255,255,255,.12);border-radius:50%}
.lhero-lab{font-size:12px;opacity:.8;margin-bottom:4px;font-weight:500}
.lhero-name{font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.lhero-bar{height:8px;background:rgba(255,255,255,.16);border-radius:4px;overflow:hidden;margin-bottom:6px;max-width:480px}
.lhero-bar-fill{height:100%;background:#fff;border-radius:4px}
.lhero-bar-txt{font-size:12px;opacity:.85;margin-bottom:12px;max-width:480px;display:flex;justify-content:space-between}
.lhero-msg{font-size:14px;opacity:.95;max-width:480px;line-height:1.5}
.lhero-coins{display:flex;gap:24px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.15);position:relative;z-index:1}
.lhero-cv{font-size:22px;font-weight:700}
.lhero-cl{font-size:12px;opacity:.8}

/* Tiers */
.tiers{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.tier{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;transition:all 120ms}
.tier:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.tier.current{border-color:var(--accent);background:var(--soft);box-shadow:0 0 0 2px var(--accent)}
.tier.locked{opacity:.6;background:var(--bg)}
.tier-name{font-weight:700;font-size:14px;color:var(--ink);margin-bottom:4px}
.tier-amt{font-size:11px;color:var(--muted);margin-bottom:6px}
.tier-cash{font-size:18px;font-weight:700;color:var(--accent)}
.tier-cash-lab{font-size:11px;color:var(--muted)}

/* Priv */
.priv-list{display:flex;flex-direction:column;gap:8px}
.priv{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--r-sm);font-size:13px;border:1px solid var(--border)}
.priv-chk{width:20px;height:20px;border-radius:50%;background:var(--good-bg);color:var(--good);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.priv-chk svg{width:11px;height:11px}
.priv-lock{background:var(--danger-bg);color:var(--danger)}
.priv strong{color:var(--ink)}

/* Filters bar */
.fbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md)}
.fbar select,.fbar input{height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);font-size:13px;color:var(--text);outline:none}
.fbar select:focus,.fbar input:focus{border-color:var(--accent)}
.fbar input[type=search]{min-width:240px}
.fbar label{font-size:12px;color:var(--muted);margin-right:4px}

/* Checkbox */
.chk{width:16px;height:16px;border:1.5px solid var(--border-s);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;cursor:pointer;transition:all 120ms;background:#fff;flex-shrink:0}
.chk.checked{background:var(--accent);border-color:var(--accent)}
.chk.checked::after{content:'';width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}

/* Doc icon */
.doc-ico{width:30px;height:30px;border-radius:6px;background:var(--soft);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-right:10px;vertical-align:middle;flex-shrink:0}
.doc-ico.cert{background:#FEF3C7;color:#92400E}
.doc-ico.upd{background:#DBEAFE;color:#1D4ED8}
.doc-ico.invoice{background:#DCFCE7;color:var(--good)}
.doc-ico.act{background:#FCE7F3;color:#9D174D}

/* Hero */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:24px;margin-bottom:18px}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-meta{font-size:12px;color:var(--muted);margin-bottom:6px}
.hero-num{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.5px;margin-right:10px}
.hero-amount{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.5px}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fade .2s ease}
.modal-overlay.open{display:flex}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{background:var(--surface);border-radius:var(--r-md);max-width:640px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideUp .25s ease}
.modal.large{max-width:840px}
.modal.xlarge{max-width:1080px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.modal-sub{font-size:13px;color:var(--muted);margin-top:2px}
.modal-close{width:32px;height:32px;border-radius:8px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg);color:var(--ink)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* DRAWER (slide-out right) */
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(2px);display:none;z-index:45;animation:fade .2s ease}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;height:100vh;background:var(--surface);box-shadow:var(--shadow-lg);z-index:46;width:760px;max-width:96vw;display:none;flex-direction:column;animation:slideR .3s ease}
.drawer.open{display:flex}
@keyframes slideR{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer.ai{width:480px}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:1}
.drawer-body{padding:22px;overflow-y:auto;flex:1}
.drawer-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface)}

/* TOAST */
.toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:60;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--r-sm);padding:12px 16px;min-width:280px;max-width:360px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;pointer-events:auto;animation:tIn .25s ease}
.toast.good{border-left-color:var(--good)}
.toast.warn{border-left-color:var(--warn)}
.toast.danger{border-left-color:var(--danger)}
@keyframes tIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-ico{width:24px;height:24px;color:var(--accent);flex-shrink:0}
.toast.good .toast-ico{color:var(--good)}
.toast.warn .toast-ico{color:var(--warn)}
.toast.danger .toast-ico{color:var(--danger)}
.toast-text{flex:1;font-size:13px;color:var(--ink)}
.toast-close{color:var(--muted);font-size:18px;line-height:1;padding:0 4px}

/* Loyalty calc */
.calc{background:linear-gradient(135deg,#FEF3C7,#FCD34D);border:1px solid #F59E0B;border-radius:var(--r-md);padding:20px}
.calc-h{font-size:14px;color:#92400E;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.calc-q{font-size:18px;font-weight:700;color:#7C2D12;margin-bottom:14px}
.calc-stat{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;font-size:14px;color:#7C2D12}
.calc-stat strong{font-size:18px;font-weight:700;color:#7C2D12}

/* Status item */
.statline{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.statline:last-child{border-bottom:none}
.stat-ico{width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.stat-info{flex:1}
.stat-title{font-size:13px;color:var(--ink);font-weight:500;margin-bottom:2px}
.stat-time{font-size:11px;color:var(--muted)}

/* Position row */
.pos-row{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;background:var(--surface);transition:all 120ms}
.pos-row:hover{border-color:var(--accent);background:var(--soft)}
.pos-thumb{width:48px;height:48px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.pos-info{flex:1;min-width:0}
.pos-title{font-weight:600;font-size:13px;color:var(--ink);margin-bottom:2px}
.pos-art{font-size:11px;color:var(--muted)}
.pos-qty{font-size:13px;color:var(--text);font-weight:500;text-align:center;min-width:60px}
.pos-price{font-size:13px;font-weight:600;color:var(--ink);text-align:right;min-width:90px}

/* Summary */
.summary{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:18px}
.summary h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-weight:600}
.summary-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-size:13px}
.summary-row strong{font-weight:600;color:var(--ink)}
.summary-total{padding:10px 0 4px;border-top:1px solid var(--border-s);margin-top:6px}
.summary-total .label{font-size:14px;font-weight:600;color:var(--ink)}
.summary-total .value{font-size:20px;font-weight:700;color:var(--ink)}

/* AI chat */
.chat-msgs{display:flex;flex-direction:column;gap:12px;padding:8px 0}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.chat-msg.ai{background:var(--soft);color:var(--ink);align-self:flex-start;border-bottom-left-radius:4px}
.chat-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg .chat-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.chat-msg .ca-btn{background:var(--surface);border:1px solid var(--border);padding:5px 10px;font-size:12px;border-radius:14px;color:var(--text);font-weight:500}
.chat-msg .ca-btn:hover{border-color:var(--accent);color:var(--accent)}
.chat-quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.chat-q-btn{padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);text-align:left;font-size:13px;color:var(--text);font-weight:500;cursor:pointer;transition:all 120ms}
.chat-q-btn:hover{border-color:var(--accent);background:var(--soft)}
.chat-q-btn-ico{font-size:18px;margin-bottom:4px;display:block}
.chat-input-wrap{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface)}
.chat-input{flex:1;height:40px;border:1px solid var(--border);border-radius:8px;padding:0 14px;outline:none;font-size:13px}
.chat-input:focus{border-color:var(--accent)}

/* Welcome */
.welcome-hero{background:linear-gradient(135deg,#0A2540,#1F8FFF);color:#fff;border-radius:var(--r-md);padding:36px;text-align:center;position:relative;overflow:hidden}
.welcome-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.1),transparent 40%);pointer-events:none}
.welcome-h1{font-size:28px;font-weight:700;margin-bottom:8px}
.welcome-sub{font-size:14px;opacity:.9;max-width:480px;margin:0 auto 18px}
.welcome-bdg{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(255,255,255,.2);border-radius:16px;font-size:13px;font-weight:600;margin-bottom:12px}
.welcome-steps{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.welcome-step{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:left;cursor:pointer;transition:all 120ms}
.welcome-step:hover{border-color:var(--accent);background:var(--soft)}
.welcome-step-ico{font-size:20px;margin-bottom:4px}
.welcome-step-t{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px}
.welcome-step-s{font-size:12px;color:var(--muted)}

/* Stepper */
.stepper{display:flex;align-items:center;margin-bottom:20px;gap:0}
.step{flex:1;display:flex;align-items:center;gap:8px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--bg);border:2px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.step.active .step-num{background:var(--accent);border-color:var(--accent);color:#fff}
.step.done .step-num{background:var(--good);border-color:var(--good);color:#fff}
.step-name{font-size:13px;font-weight:500;color:var(--muted);flex:1}
.step.active .step-name{color:var(--ink);font-weight:600}
.step.done .step-name{color:var(--good)}
.step-line{height:2px;background:var(--border);flex:1;margin:0 6px}
.step.done .step-line,.step.active .step-line{background:var(--good)}

/* Delivery card */
.dcard{background:linear-gradient(135deg,#ECFEFF,#EFF6FF);border:1px solid #BAE6FD;border-radius:var(--r-md);padding:20px;cursor:pointer;transition:all 120ms}
.dcard:hover{box-shadow:var(--shadow)}
.dcard.warn{background:linear-gradient(135deg,#FEF3C7,#FFFBEB);border-color:#FCD34D}
.dwin{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.4px;margin:4px 0 8px}
.dmeta{font-size:13px;color:var(--text);margin-bottom:14px;line-height:1.6}
.dmeta strong{color:var(--ink)}

/* Slot pick */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.slot{padding:12px;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:all 120ms;text-align:left;background:var(--surface)}
.slot:hover{border-color:var(--accent)}
.slot.selected{border-color:var(--accent);background:var(--soft);box-shadow:0 0 0 2px var(--soft)}
.slot.disabled{opacity:.4;cursor:not-allowed;background:var(--bg)}
.slot-day{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.slot-time{font-size:14px;font-weight:700;color:var(--ink);margin-top:2px}
.slot-free{font-size:11px;color:var(--good);margin-top:4px}

/* Promo banner */
.promo{background:linear-gradient(135deg,#FEF3C7,#FCD34D);border:1px solid #F59E0B;border-radius:var(--r-md);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;cursor:pointer;transition:all 120ms}
.promo:hover{box-shadow:var(--shadow)}
.promo-ico{font-size:24px}
.promo-info{flex:1}
.promo-t{font-weight:700;color:#7C2D12;font-size:14px;margin-bottom:2px}
.promo-s{font-size:13px;color:#92400E}
.promo-cta{font-weight:700;color:#7C2D12;font-size:13px}

/* Reco strip with deals */
.dealrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.deal{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;cursor:pointer;transition:all 120ms}
.deal:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.deal-bdg{position:absolute;top:8px;right:8px;background:var(--danger);color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:10px}
.deal-thumb{height:90px;background:var(--bg);border-radius:var(--r-sm);margin-bottom:10px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.deal-name{font-size:13px;color:var(--ink);font-weight:500;margin-bottom:6px;min-height:36px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.deal-price{font-size:16px;font-weight:700;color:var(--ink)}
.deal-old{font-size:12px;color:var(--muted);text-decoration:line-through}

/* Equipment card */
.eq-card{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);cursor:pointer;transition:all 120ms}
.eq-card:hover{border-color:var(--accent)}
.eq-thumb{width:56px;height:56px;background:var(--soft);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;font-size:24px}
.eq-info{flex:1}
.eq-name{font-weight:600;color:var(--ink);font-size:14px}
.eq-serial{font-size:11px;color:var(--muted);margin-top:2px}
.eq-warranty{font-size:12px;color:var(--good);margin-top:4px}

/* Course card */
.course{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:0;overflow:hidden;cursor:pointer;transition:all 120ms}
.course:hover{box-shadow:var(--shadow);border-color:var(--accent)}
.course-img{height:120px;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--accent);position:relative}
.course-bdg{position:absolute;top:10px;left:10px;background:var(--surface);font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;color:var(--accent)}
.course-body{padding:14px}
.course-t{font-weight:600;color:var(--ink);font-size:14px;margin-bottom:4px;line-height:1.3}
.course-m{font-size:12px;color:var(--muted);margin-bottom:8px}
.course-p{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.course-price{font-weight:700;color:var(--ink)}

/* Mobile */
@media(max-width:1100px){
  .row.c4{grid-template-columns:repeat(2,1fr)}
  .row.c3{grid-template-columns:repeat(2,1fr)}
  .row.c-5-3,.row.c-2-1{grid-template-columns:1fr}
  .tiers{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .content{padding:14px}
  .topbar{padding:0 14px}
  .search{display:none}
  .row.c2,.row.c4,.row.c3{grid-template-columns:1fr}
  .modal{max-width:100%}
  .drawer{width:100%}
  .welcome-steps{grid-template-columns:1fr}
  .tiers{grid-template-columns:1fr}
}
.hidden{display:none!important}

/* === v3 UPGRADE === */
/* Product image placeholder */
.pimg{border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;background-size:cover;background-position:center}
.pimg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.15));pointer-events:none}
.pimg-sm{width:42px;height:42px;font-size:20px}
.pimg-md{width:48px;height:48px;font-size:22px}
.pimg-lg{width:78px;height:78px;font-size:32px}
.pimg-xl{width:200px;height:200px;font-size:80px}
.pimg.dent{background:linear-gradient(135deg,#DBEAFE,#93C5FD);color:#1E3A8A}
.pimg.endo{background:linear-gradient(135deg,#E0E7FF,#A5B4FC);color:#3730A3}
.pimg.imp{background:linear-gradient(135deg,#FCE7F3,#F9A8D4);color:#831843}
.pimg.bur{background:linear-gradient(135deg,#FEF3C7,#FCD34D);color:#92400E}
.pimg.anest{background:linear-gradient(135deg,#D1FAE5,#6EE7B7);color:#064E3B}
.pimg.glove{background:linear-gradient(135deg,#E0F2FE,#7DD3FC);color:#0C4A6E}
.pimg.cement{background:linear-gradient(135deg,#F3E8FF,#C4B5FD);color:#4C1D95}
.pimg.matrix{background:linear-gradient(135deg,#FFEDD5,#FDBA74);color:#7C2D12}
.pimg.x{background:linear-gradient(135deg,#E5E7EB,#9CA3AF);color:#1F2937}
.pimg.bond{background:linear-gradient(135deg,#CFFAFE,#67E8F9);color:#164E63}
.pimg.eq{background:linear-gradient(135deg,#EFF6FF,#BFDBFE);color:#0A2540}

/* Charts */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px}
.chart-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.chart-t{font-size:14px;color:var(--muted);font-weight:500;margin-bottom:2px}
.chart-v{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.4px}
.chart-d{font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px}
.chart-d.up{background:var(--good-bg);color:var(--good)}
.chart-d.down{background:var(--danger-bg);color:var(--danger)}
.chart-d.flat{background:var(--bg);color:var(--muted)}
.chart-body{height:140px;position:relative}
.chart-body svg{width:100%;height:100%;overflow:visible}
.chart-grid line{stroke:var(--border);stroke-dasharray:2 4}
.bar{fill:var(--accent);rx:4;transition:opacity .2s}
.bar:hover{opacity:.7;cursor:pointer}
.bar.prev{fill:#CBD5E1}
.line-area{fill:url(#gradArea)}
.line-stroke{fill:none;stroke:var(--accent);stroke-width:2}
.line-dot{fill:#fff;stroke:var(--accent);stroke-width:2}
.legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-top:8px;justify-content:center}
.lg-dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}

/* Donut + KPI */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut svg{width:140px;height:140px}
.donut-c{font-size:11px;color:var(--muted)}
.donut-v{font-size:18px;font-weight:700;color:var(--ink);text-anchor:middle}
.kpi-list{display:flex;flex-direction:column;gap:8px;flex:1}
.kpi-row{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.kpi-row .lab{display:flex;align-items:center;gap:8px;color:var(--text)}
.kpi-row strong{color:var(--ink);font-weight:600}

/* User popover (top right) */
.usermenu{position:absolute;top:64px;right:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-lg);width:340px;z-index:55;display:none;animation:slideUp .2s ease;overflow:hidden}
.usermenu.open{display:block}
.usermenu-head{padding:18px;background:linear-gradient(135deg,#0A2540,#1F8FFF);color:#fff;position:relative}
.usermenu-head::before{content:'';position:absolute;right:-30px;bottom:-30px;width:120px;height:120px;border:1px solid rgba(255,255,255,.15);border-radius:50%}
.usermenu-head::after{content:'';position:absolute;right:10px;bottom:10px;width:60px;height:60px;border:1px solid rgba(255,255,255,.1);border-radius:50%}
.umh-row{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.umh-av{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.umh-name{font-size:15px;font-weight:700}
.umh-meta{font-size:11px;opacity:.85;margin-top:2px}
.umh-bdg{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(255,255,255,.2);border-radius:10px;font-size:11px;font-weight:600;margin-top:6px}
.um-list{padding:6px 0}
.um-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text);font-size:13px;font-weight:500;transition:background 120ms}
.um-item:hover{background:var(--bg)}
.um-item-ico{width:18px;height:18px;color:var(--muted);flex-shrink:0}
.um-item:hover .um-item-ico{color:var(--accent)}
.um-item .arr{margin-left:auto;color:var(--muted);font-size:14px}
.um-divider{height:1px;background:var(--border);margin:6px 0}
.um-quick{padding:10px 16px;background:var(--bg);font-size:11px;color:var(--muted)}
.um-quick-row{display:flex;justify-content:space-between;padding:3px 0}
.um-quick-row strong{color:var(--ink);font-weight:600}
.um-foot{padding:10px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--danger);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px}
.um-foot:hover{background:#FEF2F2}

/* Notification popover */
.notifpop{position:absolute;top:64px;right:140px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-lg);width:380px;max-height:480px;z-index:55;display:none;overflow:hidden;animation:slideUp .2s ease}
.notifpop.open{display:flex;flex-direction:column}
.notifpop-h{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.notifpop-list{flex:1;overflow-y:auto;padding:8px}

/* Year purchases — table card */
.yp-table th,.yp-table td{padding:10px 12px}

/* Sortable */
.tbl th.sort{cursor:pointer;user-select:none}
.tbl th.sort:hover{color:var(--ink)}
.tbl th.sort-active{color:var(--accent)}
.tbl th.sort-active::after{content:' ↓';font-size:10px}
.tbl th.sort-asc::after{content:' ↑';font-size:10px}

/* Tier comparison */
.tier-cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.tier-cmp-col{padding:14px;border-radius:8px;border:1px solid}
.tier-cmp-col.now{background:var(--bg);border-color:var(--border)}
.tier-cmp-col.next{background:linear-gradient(135deg,#FEF3C7,#FCD34D);border-color:#F59E0B}
.tier-cmp-t{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.tier-cmp-col.next .tier-cmp-t{color:#7C2D12}
.tier-cmp-n{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:10px}
.tier-cmp-col.next .tier-cmp-n{color:#7C2D12}
.tcp-stat{padding:6px 0;border-bottom:1px dashed rgba(0,0,0,.08);display:flex;justify-content:space-between;font-size:13px}
.tcp-stat:last-child{border-bottom:none}
.tcp-stat strong{color:var(--ink)}
.tier-cmp-col.next .tcp-stat strong{color:#7C2D12}

/* === v3.18 PREMIUM WELCOME === */
.welcome-modal{max-width:1080px;border-radius:18px;overflow:hidden}
.wel-hero{position:relative;padding:48px 48px 36px;background:radial-gradient(ellipse at top right,#1F8FFF 0%,#0A2540 60%);color:#fff;overflow:hidden;min-height:340px}
.wel-orb{position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,.1);pointer-events:none}
.wel-orb.o1{width:520px;height:520px;right:-100px;top:-100px;animation:welOrb 28s linear infinite}
.wel-orb.o2{width:340px;height:340px;right:40px;bottom:-80px;animation:welOrb 36s linear infinite reverse}
.wel-orb.o3{width:160px;height:160px;right:120px;top:80px;border-color:rgba(255,255,255,.18);animation:welOrb 22s linear infinite}
.wel-orb.o4{width:80px;height:80px;right:200px;bottom:80px;border-color:rgba(255,255,255,.25)}
.wel-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(31,143,255,.4) 0%,transparent 60%);filter:blur(40px);right:-200px;top:-200px;pointer-events:none;animation:welGlow 6s ease-in-out infinite alternate}
@keyframes welOrb{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes welGlow{0%{opacity:.4}100%{opacity:.7}}
.wel-spark{position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;opacity:.8;animation:welSpark 3s ease-in-out infinite}
.wel-spark.s1{right:140px;top:100px;animation-delay:0s}
.wel-spark.s2{right:300px;top:160px;animation-delay:.6s}
.wel-spark.s3{right:200px;top:220px;animation-delay:1.2s}
.wel-spark.s4{right:380px;top:80px;animation-delay:1.8s;width:4px;height:4px}
@keyframes welSpark{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.4);box-shadow:0 0 12px rgba(255,255,255,.6)}}
.wel-content{position:relative;z-index:2}
.wel-bdg{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:linear-gradient(135deg,rgba(245,158,11,.3),rgba(252,211,77,.3));backdrop-filter:blur(8px);border:1px solid rgba(252,211,77,.4);border-radius:24px;font-size:12px;font-weight:600;margin-bottom:16px;animation:fadeUp .6s ease both}
.wel-bdg-a{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#FCD34D,#F59E0B);color:#7C2D12;font-size:11px;font-weight:800}
.wel-greet{font-size:14px;opacity:.85;margin-bottom:6px;animation:fadeUp .7s .05s ease both}
.wel-title{font-size:42px;font-weight:800;letter-spacing:-1px;line-height:1.05;margin-bottom:8px;animation:fadeUp .7s .1s ease both;background:linear-gradient(135deg,#fff 30%,#A5D8FF);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#fff}
.wel-sub{font-size:15px;opacity:.85;max-width:560px;line-height:1.6;animation:fadeUp .7s .15s ease both;margin-bottom:24px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.wel-kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border-radius:14px;border:1px solid rgba(255,255,255,.12);overflow:hidden;animation:fadeUp .7s .25s ease both}
.wel-kpi{padding:14px 16px;border-right:1px solid rgba(255,255,255,.1)}
.wel-kpi:last-child{border-right:none}
.wel-kpi-l{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px}
.wel-kpi-v{font-size:18px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.wel-kpi-s{font-size:11px;opacity:.75}
.wel-kpi-s.up{color:#6EE7B7}
.wel-kpi-s.warn{color:#FCD34D}

.wel-body{padding:36px 48px}
.wel-sec-t{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.wel-sec-t::after{content:'';flex:1;height:1px;background:var(--border)}
.wel-today{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;animation:fadeUp .7s .3s ease both}
.wel-tev{padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;transition:all 200ms;position:relative;overflow:hidden}
.wel-tev:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-2px)}
.wel-tev-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.wel-tev-when{font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:2px}
.wel-tev-t{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4}
.wel-tev-s{font-size:11px;color:var(--muted);margin-top:4px}

.wel-priv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;animation:fadeUp .7s .35s ease both}
.wel-priv{padding:18px;border:1px solid var(--border);border-radius:14px;background:var(--surface);cursor:pointer;transition:all 200ms;position:relative;overflow:hidden}
.wel-priv:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:transparent}
.wel-priv::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(31,143,255,.05));opacity:0;transition:opacity 200ms;pointer-events:none}
.wel-priv:hover::before{opacity:1}
.wel-priv-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;position:relative}
.wel-priv-t{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px}
.wel-priv-v{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px}
.wel-priv-cta{font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:4px}

.wel-cta{position:relative;background:linear-gradient(135deg,#7C2D12,#92400E,#B45309);color:#fff;border-radius:16px;padding:24px 28px;margin-bottom:24px;overflow:hidden;animation:fadeUp .7s .4s ease both}
.wel-cta::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border:1.5px solid rgba(252,211,77,.3);border-radius:50%;animation:welOrb 18s linear infinite}
.wel-cta::after{content:'';position:absolute;right:30px;bottom:-30px;width:120px;height:120px;border:1px solid rgba(252,211,77,.4);border-radius:50%}
.wel-cta-row{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
.wel-cta-left{flex:1;min-width:300px}
.wel-cta-bdg{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border-radius:10px;font-size:11px;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.wel-cta-t{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.wel-cta-s{font-size:13px;opacity:.9;line-height:1.5;margin-bottom:14px;max-width:480px}
.wel-cta-bar{height:10px;background:rgba(255,255,255,.2);border-radius:5px;overflow:hidden;max-width:480px;margin-bottom:8px}
.wel-cta-bar-f{height:100%;background:linear-gradient(90deg,#FCD34D,#FBBF24);border-radius:5px;width:0;animation:welBar 1.4s .8s ease-out forwards}
@keyframes welBar{from{width:0}to{width:71%}}
.wel-cta-prog{font-size:12px;opacity:.85;display:flex;justify-content:space-between;max-width:480px}
.wel-cta-right{text-align:right}
.wel-cta-amt{font-size:32px;font-weight:800;letter-spacing:-.5px}
.wel-cta-amt-l{font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:.6px}

.wel-foot{padding:20px 48px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg);gap:16px;flex-wrap:wrap}
.wel-foot-l{font-size:13px;color:var(--muted);flex:1;min-width:240px;line-height:1.5}
.wel-foot-l strong{color:var(--ink);font-weight:600}
.wel-foot-a{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:nowrap}
.wel-foot-a .wel-btn-primary,.wel-foot-a .wel-btn-secondary{flex-shrink:0}
.wel-btn-primary{background:linear-gradient(135deg,#1F8FFF,#0066CC);color:#fff;padding:0 24px;height:44px;border-radius:10px;font-weight:600;display:inline-flex;align-items:center;gap:8px;font-size:14px;border:none;cursor:pointer;transition:transform .15s,box-shadow .15s;line-height:1}
.wel-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(31,143,255,.4)}
.wel-btn-secondary{background:var(--surface);color:var(--ink);padding:0 20px;height:44px;border-radius:10px;font-weight:600;border:1px solid var(--border);cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:8px;line-height:1}
.wel-btn-secondary:hover{background:var(--bg);border-color:var(--border-s)}
.wel-btn-primary svg,.wel-btn-secondary svg{width:16px;height:16px;flex-shrink:0}

@media(max-width:900px){
  .wel-hero{padding:32px 28px 28px;min-height:280px}
  .wel-title{font-size:30px}
  .wel-kpi-strip{grid-template-columns:repeat(3,1fr)}

  .wel-body{padding:24px 24px}

  .wel-foot{padding:16px 24px}
}
@media(max-width:560px){

  .wel-cta-amt{font-size:24px}
}

/* ===== MODAL ===== */
function openModal(html,size=''){
  const c=$('#modal-container');
  c.className='modal'+(size?' '+size:'');
  c.innerHTML=html;
  $('#modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  $('#modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}
/* ===== DRAWER ===== */
function openDrawer(html,opts={}){
  const d=$('#drawer');
  d.className='drawer'+(opts.ai?' ai':'');
  d.innerHTML=html;
  d.classList.add('open');
  $('#drawer-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  $('#drawer').classList.remove('open');
  $('#drawer-overlay').classList.remove('open');
  document.body.style.overflow='';
}
/* ===== TOAST ===== */
function toast(text,kind=''){
  const t=document.createElement('div');
  t.className='toast '+kind;
  t.innerHTML=`<div class="toast-ico">${kind==='good'?I.ok:kind==='warn'?I.warn:kind==='danger'?I.warn:I.spark}</div><div class="toast-text">${text}</div><button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.transition='all .25s';t.style.opacity='0';t.style.transform='translateX(20px)';setTimeout(()=>t.remove(),250)},4500);
}

/* ===== ALERT ACTION DISPATCH ===== */
function execAction(action){
  if(action.startsWith('order:')){openOrderDrawer(action.split(':')[1]);return}
  if(action.startsWith('navto:')){navTo(action.split(':')[1]);return}
  if(action.startsWith('modal:')){
    const m=action.split(':')[1];
    if(m==='burn-coins')return openBurnCoinsModal();
  }
  if(action.startsWith('doc:'))return openDocPreview(action.split(':')[1]);
}

let ordersFilter={status:'all',period:'all',legal:'all'};
let ordersSort={field:'date',dir:'desc'};
let selectedOrders=new Set();
function toggleOrderSelect(id){
  if(selectedOrders.has(id))selectedOrders.delete(id);else selectedOrders.add(id);
  renderContent();

function toggleAllOrders(){
  const list=getFilteredOrders();
  if(selectedOrders.size===list.length){selectedOrders.clear()}else{list.forEach(o=>selectedOrders.add(o.id))}
  renderContent();
}
function repeatSelectedOrders(){
  if(!selectedOrders.size)return;
  const n=selectedOrders.size;
  toast(`Готовим повтор ${n} заказа${n>1?'ов':''} · проверка наличия...`,'good');
  setTimeout(()=>{selectedOrders.clear();renderContent();navTo('fast');toast('Все позиции добавлены в корзину','good')},800);
}
function getFilteredOrders(){
  let list=ORDERS.slice();
  if(ordersFilter.status==='active')list=list.filter(o=>o.status==='assemble'||o.status==='ship'||o.status==='ready'||o.status==='accept');
  else if(ordersFilter.status==='ship')list=list.filter(o=>o.status==='ship');
  else if(ordersFilter.status==='deliv')list=list.filter(o=>o.status==='deliv');
  else if(ordersFilter.status==='cancel')list=list.filter(o=>o.status==='cancel');
  if(ordersFilter.period==='today')list=list.filter(o=>o.date==='20.05.2026'||o.date==='19.05.2026');
  else if(ordersFilter.period==='may')list=list.filter(o=>o.date.includes('.05.'));
  else if(ordersFilter.period==='apr')list=list.filter(o=>o.date.includes('.04.'));
  else if(ordersFilter.period==='q2')list=list.filter(o=>['04','05','06'].includes(o.date.split('.')[1]));
  else if(ordersFilter.period==='q1')list=list.filter(o=>['01','02','03'].includes(o.date.split('.')[1]));
  else if(ordersFilter.period==='year')list=list.filter(o=>o.date.includes('.2026'));
  // sort
  list.sort((a,b)=>{
    const f=ordersSort.field;let av=a[f],bv=b[f];
    if(f==='date'){av=a.date.split('.').reverse().join('');bv=b.date.split('.').reverse().join('')}
    if(f==='sum'||f==='positions'){return ordersSort.dir==='desc'?bv-av:av-bv}
    return ordersSort.dir==='desc'?(bv>av?1:-1):(av>bv?1:-1);
  });
  return list;
}

  if(!d){toast('Документ не найден','danger');return}
  openModal(`
    <div class="modal-head"><div><div class="modal-title">${d.typeLabel} ${d.num}</div><div class="modal-sub">${d.orderId} · ${d.date} · ${d.legal}</div></div><button class="modal-close" onclick="closeModal()">${I.close}</button></div>
    <div class="modal-body">
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:36px;text-align:center;margin-bottom:14px">
        <div style="font-size:48px;color:var(--accent);margin-bottom:12px">${I.doc}</div>
        <div style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px">${d.typeLabel} ${d.num}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:18px">${d.legal} · ${d.date}${d.sum?' · '+fmt(d.sum):''}</div>
        <div style="height:240px;background:#fff;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-style:italic">[ Превью PDF документа · симуляция ]</div>

      <div class="row c2">

              <td>${d.date}</td>
              <td>${d.orderId==='—'?'<span style="color:var(--muted)">—</span>':`<a onclick="event.stopPropagation();openOrderDrawer('${d.orderId}')">${d.orderId}</a>`}</td>

                <button class="btn btn-icon btn-primary" title="Скачать" onclick="simulateDownload('${d.typeLabel} ${d.num}')">${I.download}</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div style="text-align:center;margin-top:14px;display:flex;gap:10px;justify-content:center">
      <button class="btn btn-secondary" onclick="simulateDownload('Пакет документов за май 2026')">📦 Скачать пакет за май в ZIP</button>

    </div>
  `;

function getFilteredDocs(){
  let list=DOCS;
  if(docsTab!=='all')list=list.filter(d=>d.type===docsTab);
  if(state.docFilters.period==='month')list=list.filter(d=>d.date.includes('.05.'));
  if(state.docFilters.period==='prev')list=list.filter(d=>d.date.includes('.04.'));
  if(state.docFilters.search)list=list.filter(d=>d.num.toLowerCase().includes(state.docFilters.search.toLowerCase()));
  if(state.docFilters.orderId&&state.docFilters.orderId!=='all')list=list.filter(d=>d.orderId===state.docFilters.orderId);
  return list;
}
function toggleDoc(id){
  if(state.selectedDocs.has(id))state.selectedDocs.delete(id);else state.selectedDocs.add(id);
  renderContent();
}
function toggleAllDocs(){
  const filt=getFilteredDocs();
  if(state.selectedDocs.size===filt.length){state.selectedDocs.clear()}else{filt.forEach(d=>state.selectedDocs.add(d.id))}
  renderContent();
}
function downloadSelectedDocs(){
  if(!state.selectedDocs.size)return toast('Выберите хотя бы 1 документ','warn');
  toast(`<strong>${state.selectedDocs.size} документов</strong> упаковано в ZIP, скачивание начнётся через 2 сек (демо)`,'good');
}

          <div class="tcp-stat"><span>Итого выгода</span><strong>${fmt(cbCur+discCur)}/кв</strong></div>

        <div class="tier-cmp-col next">
          <div class="tier-cmp-t">Стало бы (${t.name})</div>
          <div class="tier-cmp-n">${t.cb}% кэшбэк · ${t.disc}% скидка</div>
          <div class="tcp-stat"><span>При тех же ${fmt(Q)}</span><strong>—</strong></div>
          <div class="tcp-stat"><span>Кэшбэк</span><strong>+${fmtNum(cbT)} баллов</strong></div>

          <div class="tcp-stat"><span>Итого выгода</span><strong>${fmt(cbT+discT)}/кв</strong></div>

      `:isBelow?`
      <div class="tier-cmp">
        <div class="tier-cmp-col next" style="background:linear-gradient(135deg,#D1FAE5,#A7F3D0);border-color:#10B981">
          <div class="tier-cmp-t" style="color:#065F46">Сейчас (${tCur.name})</div>
          <div class="tier-cmp-n" style="color:#065F46">${tCur.cb}% кэшбэк · ${tCur.disc}% скидка</div>
